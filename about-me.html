<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me – Michael Needham</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="carousel.css">
  <link rel="stylesheet" href="bg-anim.css">
  <link rel="stylesheet" href="site-bubbles.css">
  <style>
    :root {
      --am-surface:  #13141f;
      --am-border:   #252740;
      --am-muted:    #6b7099;
      --am-tag-bg:   #1c1e30;
      --am-radius:   14px;
      --am-shadow:   0 8px 40px rgba(0,0,0,.55);
      --am-rainbow:  linear-gradient(135deg, #f97316, #eab308, #22c55e, #06b6d4, #6366f1, #a855f7, #ec4899);
    }

    body { background: #0a0a0f; }

    .am-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 60px;
      min-height: 100vh;
      position: relative;
      z-index: 10;
    }

    .am-back-row-inline {
      width: 100%;
      max-width: 1080px;
      margin: 0 0 20px;
    }

    .am-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 120px;
      width: 100%;
      max-width: 1300px;
      margin: -85px auto 0;
      justify-content: center;
    }
    @media (max-width: 720px) {
      .am-grid { grid-template-columns: 1fr; }
    }

    .am-footer {
      margin-top: 40px;
      color: var(--am-muted, #6b7099);
      font-size: .78rem;
      text-align: center;
    }
    .am-footer a {
      background: var(--rainbow);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      font-weight: 600;
    }
    .am-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Cloud swirl background animation -->
  <svg id="svg-filters" style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
    <defs>
      <filter id="cloud-warp" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence id="cloud-turb" type="fractalNoise" baseFrequency="0.009 0.011" numOctaves="4" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="124" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="cloud-warp-b" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence id="cloud-turb-b" type="fractalNoise" baseFrequency="0.010 0.009" numOctaves="4" seed="13" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="124" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
  <div class="background-container" id="bgLayerA"></div>
  <div class="background-container" id="bgLayerB"></div>
  <div class="cloud-layer cloud-layer-1" aria-hidden="true">
    <div class="cloud-inner" id="cloud1A"></div>
    <div class="cloud-inner" id="cloud1B"></div>
  </div>
  <div class="cloud-layer cloud-layer-2" aria-hidden="true">
    <div class="cloud-inner" id="cloud2A"></div>
    <div class="cloud-inner" id="cloud2B"></div>
  </div>

  <div class="am-page">
    <div class="bubble-page-field" id="aboutMeField">

      <div class="am-back-row-inline">
        <a href="index.html" class="bubble-back-btn" id="aboutMeBack" aria-label="Back to portfolio">
          <span class="bbb-arrow" aria-hidden="true">&larr;</span>
          <span class="bbb-tooltip">Portfolio</span>
        </a>
      </div>

      <div class="bubble-title bubble-cycling-glow" id="aboutMeTitle">
        <h1>About Me</h1>
      </div>
      <div class="bubble-title-caption">
        <span class="label">Portfolio</span>
        <p>Developer &middot; Artist &middot; Activist</p>
      </div>

      <div class="am-grid">
        <div class="deck-column">
          <div class="deck-wrap" id="journeyDeck"></div>
          <div class="deck-controls">
            <button type="button" class="deck-arrow-btn" id="journeyPrev" aria-label="Previous slide in Journey carousel">&lsaquo;</button>
            <span class="deck-slide-count" id="journeyLive" aria-live="polite"></span>
            <button type="button" class="deck-arrow-btn" id="journeyNext" aria-label="Next slide in Journey carousel">&rsaquo;</button>
          </div>
        </div>
        <div class="deck-column">
          <div class="deck-wrap" id="skillsDeck"></div>
          <div class="deck-controls">
            <button type="button" class="deck-arrow-btn" id="skillsPrev" aria-label="Previous slide in Skills carousel">&lsaquo;</button>
            <span class="deck-slide-count" id="skillsLive" aria-live="polite"></span>
            <button type="button" class="deck-arrow-btn" id="skillsNext" aria-label="Next slide in Skills carousel">&rsaquo;</button>
          </div>
        </div>
      </div>

    </div><!-- /.bubble-page-field -->

    <footer class="am-footer">
      <a href="index.html">Portfolio</a> &middot; Michael Needham &middot; Developer &middot; Artist &middot; Activist
    </footer>

  </div><!-- /.am-page -->

  <script src="bg-anim.js"></script>
  <script src="bubble-fx.js"></script>
  <script src="bubble-physics.js"></script>
  <script src="about-me-decks.js"></script>
  <script src="about-me-bubbles.js"></script>
</body>
</html>
