<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASMRtists — Coming Soon</title>
<meta property="og:title" content="ASMRtists — Coming Soon">
<meta property="og:description" content="A new platform for ASMR artists. Coming soon.">
<meta property="og:type" content="website">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{
    height:100%;
    background: #04020e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color:#fff;
    overflow:hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
    position:relative;
  }

  .bg-layer{
    position:fixed;
    inset:0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
    will-change: transform;
    animation: bgDrift 22s ease-in-out infinite;
  }
  #bgA{ opacity: 1; }
  #bgB{ opacity: 0; animation-delay: -11s; }

  @keyframes bgDrift {
    0%, 100% { transform: scale(1.08) translate(0%, 0%); }
    50%      { transform: scale(1.16) translate(-1.5%, 1%); }
  }

  .bg-overlay{
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at top, rgba(40,20,60,0.55) 0%, rgba(4,2,14,0.86) 70%);
  }

  .panel{
    position: relative;
    z-index: 2;
    max-width: 560px;
    width:100%;
    padding: 56px 40px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 24px;
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow:
      0 0 60px rgba(102,126,234,0.3),
      0 20px 50px rgba(0,0,0,0.5),
      inset 0 0 24px rgba(255,255,255,0.03);
  }
  .icon{
    font-size: 3rem;
    line-height:1;
    margin-bottom: 18px;
    text-shadow: 0 0 24px rgba(180,155,255,0.7);
  }
  h1{
    font-size: 2.1rem;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(160,130,255,0.6);
  }
  .badge{
    display:inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 999px;
    padding: 6px 16px;
    margin-bottom: 24px;
  }
  p{
    font-size: 1rem;
    line-height:1.6;
    color: rgba(255,255,255,0.82);
    margin-bottom: 32px;
  }
  .invest{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 14px 28px;
    border-radius: 999px;
    background: rgba(102,126,234,0.28);
    border: 1px solid rgba(255,255,255,0.35);
    color:#fff;
    text-decoration:none;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
  }
  .invest:hover{
    background: rgba(102,126,234,0.45);
    box-shadow: 0 0 26px rgba(102,126,234,0.55);
    transform: translateY(-2px);
  }

  @media (prefers-reduced-motion: reduce) {
    .bg-layer { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="bg-layer" id="bgA"></div>
  <div class="bg-layer" id="bgB"></div>
  <div class="bg-overlay"></div>

  <div class="panel">
    <div class="icon">🎨</div>
    <div class="badge">Coming Soon</div>
    <h1>ASMRtists</h1>
    <p>A new platform for ASMR artists is on its way. Interested in getting involved early?</p>
    <a class="invest" href="mailto:invest@asmrtists.ca">✉ invest@asmrtists.ca</a>
  </div>

  <script>
    (function () {
      var IMAGES = ['../images/Do-ItBow%232.JPG', '../images/GhostyBow%234.JPEG'];
      var HOLD_MS = 6000;
      var FADE_MS = 3000;

      var bgA = document.getElementById('bgA');
      var bgB = document.getElementById('bgB');
      bgA.style.backgroundImage = "url('" + IMAGES[0] + "')";
      bgB.style.backgroundImage = "url('" + IMAGES[1] + "')";
      bgA.style.transition = bgB.style.transition = 'opacity ' + FADE_MS + 'ms ease-in-out';

      var showingA = true;
      setInterval(function () {
        if (showingA) { bgB.style.opacity = '1'; bgA.style.opacity = '0'; }
        else          { bgA.style.opacity = '1'; bgB.style.opacity = '0'; }
        showingA = !showingA;
      }, HOLD_MS + FADE_MS);
    })();
  </script>
</body>
</html>
