  <style>
    body { background: #0a0a0f; }

    .pg-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 80px;
      min-height: 100vh;
      position: relative;
      z-index: 10;
    }

    .pg-header {
      text-align: center;
      margin-bottom: 32px;
      padding: 32px 48px 28px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 72px;
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(102, 126, 234, 0.18),
        0 8px 40px rgba(0, 0, 0, 0.45),
        inset 0 0 20px rgba(255, 255, 255, 0.03);
      max-width: 600px;
      width: 100%;
    }
    .pg-header .label {
      display: block;
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f97316, #eab308, #22c55e, #06b6d4, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .pg-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fff;
      text-shadow:
        0 0 28px rgba(102, 126, 234, 0.6),
        0 0 60px rgba(102, 126, 234, 0.2),
        0 2px 12px rgba(0, 0, 0, 0.8);
      margin: 0;
    }

    .am-back-row {
      position: fixed;
      top: 16px;
      left: 24px;
      z-index: 100;
    }
    .am-back-row .nav-button h4 {
      font-size: 0.9rem;
      margin: 0;
      padding: 0;
    }
    .am-back-row .nav-button { padding: 8px 14px; }

    .pg-footer {
      margin-top: 48px;
      color: rgba(255,255,255,0.35);
      font-size: .78rem;
      text-align: center;
    }
    .pg-footer a {
      background: linear-gradient(135deg, #f97316, #eab308, #22c55e, #06b6d4, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      font-weight: 600;
    }
    .pg-footer a:hover { text-decoration: underline; }
  </style>
</head>

  <!-- Cloud swirl background animation -->
  <svg id="svg-filters" style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
    <defs>
      <filter id="cloud-warp" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence id="cloud-turb" type="fractalNoise" baseFrequency="0.009 0.011" numOctaves="4" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="124" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="cloud-warp-b" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence id="cloud-turb-b" type="fractalNoise" baseFrequency="0.010 0.009" numOctaves="4" seed="13" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="124" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div class="background-container" id="bgLayerB"></div>
