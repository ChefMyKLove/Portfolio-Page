<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Michael Needham</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="carousel.css">
  <link rel="stylesheet" href="bg-anim.css">
  <link rel="stylesheet" href="site-bubbles.css">
  <style>
    body { background: #0a0a0f; }

    .ct-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 80px;
      min-height: 100vh;
      position: relative;
      z-index: 10;
    }

    .ct-header {
      text-align: center;
      margin-bottom: 32px;
      padding: 32px 48px 28px;
      background: rgba(255, 255, 255, 0.07);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 72px;
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(102, 126, 234, 0.18),
        0 8px 40px rgba(0, 0, 0, 0.45),
        inset 0 0 20px rgba(255, 255, 255, 0.03);
      max-width: 600px;
      width: 100%;
    }
    .ct-header .label {
      display: block;
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f97316, #eab308, #22c55e, #06b6d4, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .ct-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fff;
      text-shadow:
        0 0 28px rgba(102, 126, 234, 0.6),
        0 0 60px rgba(102, 126, 234, 0.2),
        0 2px 12px rgba(0, 0, 0, 0.8);
      margin: 0;
    }

    .am-back-row {
      position: fixed;
      top: 16px;
      left: 24px;
      z-index: 100;
    }
    .am-back-row .nav-button h4 {
      font-size: 0.9rem;
      margin: 0;
      padding: 0;
    }
    .am-back-row .nav-button { padding: 8px 14px; }

    /* ── Bubble pool field ──
       Default layout is a centered flex-wrap grid (works with no JS,
       reduced motion, and tiny screens). bubble-pool.js adds .pool-active
       and takes over positioning with physics. */
    .bubble-field {
      position: relative;
      width: 100%;
      max-width: 1020px;
      height: min(74vh, 700px);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .bubble-field.pool-active {
      display: block;
      touch-action: none;
    }
    .pool-bubble {
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
      cursor: grab;
    }
    .bubble-field.pool-active .pool-bubble {
      position: absolute;
      top: 0;
      left: 0;
      margin: 0;
      touch-action: none;
      will-change: transform;
      /* JS owns transform — no transform transition or hover scale here */
      transition: box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }
    .pool-bubble.dragging {
      cursor: grabbing;
      z-index: 20;
      transition: none;
    }
    /* Big email bubble: extra size + the cycling rainbow-photo slideshow
       inside the glass (backgroundCycle keyframes come from carousel.css) */
    #emailTrigger {
      width: 280px;
      height: 280px;
      position: relative;
      overflow: hidden;
    }
    #emailTrigger::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      animation: backgroundCycle 104s infinite ease-in-out;
      opacity: 0.5;
      box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }
    #emailTrigger .gb-icon,
    #emailTrigger .gb-label,
    #emailTrigger .gb-sub {
      position: relative;
    }
    #emailTrigger .gb-label,
    #emailTrigger .gb-sub {
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.95), 0 2px 16px rgba(0, 0, 0, 0.8);
    }
    @media (max-width: 640px) {
      .bubble-field { height: 70vh; }
      .glass-bubble-xl, #emailTrigger { width: 150px; height: 150px; }
      .glass-bubble-xl .gb-icon { font-size: 2rem; }
      .glass-bubble-xl .gb-label { font-size: 0.72rem; }
      .glass-bubble { width: 76px; height: 76px; }
      .glass-bubble .gb-icon { font-size: 1.3rem; }
      .glass-bubble .gb-label { font-size: 0.62rem; }
      .gb-sub { display: none; }
    }

    .ct-footer {
      margin-top: 48px;
      color: rgba(255,255,255,0.35);
      font-size: .78rem;
      text-align: center;
    }
    .ct-footer a {
      background: linear-gradient(135deg, #f97316, #eab308, #22c55e, #06b6d4, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      font-weight: 600;
    }
    .ct-footer a:hover { text-decoration: underline; }

    /* ── Social media link rows ── */
    .ct-grid .section-content-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    @keyframes rainbowShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .ct-grid .section-content-box h3 {
      font-size: 1.12rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
      background: linear-gradient(135deg, #f97316, #eab308, #22c55e, #06b6d4, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.18);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.95)) drop-shadow(0 0 18px rgba(0,0,0,0.8));
    }
    .ct-grid .section-content-box p {
      background: rgba(4, 2, 14, 0.62);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 3px solid #eab308;
      border-radius: 10px;
      padding: 10px 16px;
      margin: 6px 0;
      text-align: left;
      font-size: 0.9rem;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 2px 12px rgba(0,0,0,0.85);
      box-shadow: 0 4px 18px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.03);
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }
    .ct-grid .section-content-box p:hover {
      background: rgba(8, 4, 28, 0.75);
      border-left-color: #f97316;
      box-shadow: 0 6px 28px rgba(0,0,0,0.7), 0 0 0 1px rgba(234,179,8,0.25), inset 0 0 18px rgba(234,179,8,0.04);
      transform: translateX(5px);
    }
    .ct-grid .section-content-box a {
      background: linear-gradient(90deg, #f97316, #eab308, #22c55e, #06b6d4, #6366f1, #a855f7, #ec4899, #f97316);
      background-size: 280% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      text-decoration: none;
      animation: rainbowShift 5s linear infinite;
      filter: drop-shadow(0 0 4px rgba(99, 102, 241, 0.28));
      transition: filter 0.2s ease;
    }
    .ct-grid .section-content-box a:hover {
      filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.95)) drop-shadow(0 0 20px rgba(249, 115, 22, 0.55));
    }
  </style>
</head>
<body>
  <!-- Cloud swirl background animation -->
  <svg id="svg-filters" style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
    <defs>
      <filter id="cloud-warp" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence id="cloud-turb" type="fractalNoise" baseFrequency="0.009 0.011" numOctaves="4" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="124" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="cloud-warp-b" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence id="cloud-turb-b" type="fractalNoise" baseFrequency="0.010 0.009" numOctaves="4" seed="13" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="124" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
  <div class="background-container" id="bgLayerA"></div>
  <div class="background-container" id="bgLayerB"></div>
  <div class="cloud-layer cloud-layer-1" aria-hidden="true">
    <div class="cloud-inner" id="cloud1A"></div>
    <div class="cloud-inner" id="cloud1B"></div>
  </div>
  <div class="cloud-layer cloud-layer-2" aria-hidden="true">
    <div class="cloud-inner" id="cloud2A"></div>
    <div class="cloud-inner" id="cloud2B"></div>
  </div>

  <div class="am-back-row">
    <a href="index.html" class="nav-button"><h4>← Home</h4></a>
  </div>

  <div class="ct-page">
    <header class="ct-header">
      <span class="label">Portfolio</span>
      <h1>Get in Touch</h1>
    </header>

    <!-- Bubble pool: grab a bubble, fling it, watch the break. Short click still opens the link. -->
    <div class="bubble-field" id="bubbleField" aria-label="Contact and social links">
      <button type="button" class="glass-bubble glass-bubble-xl pool-bubble" id="emailTrigger"
              data-email="chefmyklove@gmail.com"
              aria-label="Copy email address. Double-click to open the message form.">
        <span class="gb-icon">✉️</span>
        <span class="gb-label">chefmyklove@gmail.com</span>
        <span class="gb-sub">click to copy · double-click to message</span>
      </button>
      <a class="glass-bubble pool-bubble" href="https://x.com/ordinalrainbows" target="_blank" rel="noopener noreferrer" aria-label="X — @ordinalrainbows">
        <span class="gb-icon">𝕏</span>
        <span class="gb-label">X</span>
      </a>
      <a class="glass-bubble pool-bubble" href="https://instagram.com/ordinalrainbows" target="_blank" rel="noopener noreferrer" aria-label="Instagram — ORDINAL RAINBOWS">
        <span class="gb-icon">📸</span>
        <span class="gb-label">Instagram</span>
      </a>
      <a class="glass-bubble pool-bubble" href="https://www.linkedin.com/in/chefmyklove" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn — Michael A. Needham">
        <span class="gb-icon">💼</span>
        <span class="gb-label">LinkedIn</span>
      </a>
      <a class="glass-bubble pool-bubble" href="https://www.reddit.com/user/myklovenotwar" target="_blank" rel="noopener noreferrer" aria-label="Reddit — ChefMyKLove">
        <span class="gb-icon">👽</span>
        <span class="gb-label">Reddit</span>
      </a>
      <a class="glass-bubble pool-bubble" href="https://www.tiktok.com/@ordinalrainbows" target="_blank" rel="noopener noreferrer" aria-label="TikTok — OrdinalRainbows">
        <span class="gb-icon">🎵</span>
        <span class="gb-label">TikTok</span>
      </a>
      <a class="glass-bubble pool-bubble" href="https://bsky.app/profile/chefmyklove.bsky.social" target="_blank" rel="noopener noreferrer" aria-label="Bluesky — @ChefMyKLove.bsky.social">
        <span class="gb-icon">🦋</span>
        <span class="gb-label">Bluesky</span>
      </a>
      <a class="glass-bubble pool-bubble" href="https://www.patreon.com/chefmyklove" target="_blank" rel="noopener noreferrer" aria-label="Patreon — Support me on Patreon">
        <span class="gb-icon">🧡</span>
        <span class="gb-label">Patreon</span>
      </a>
    </div>

    <footer class="ct-footer">
      <a href="index.html">Home</a> · Michael Needham · Developer · Artist · Activist
    </footer>
  </div>

  <!-- Modal for contact form -->
  <div id="contactModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Send me a message</h3>
      <form id="contactForm" action="https://submit-form.com/lrddY0Mbk" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="interactivity.js"></script>
  <script src="bg-anim.js"></script>
  <script src="bubble-pool.js"></script>
</body>
</html>
